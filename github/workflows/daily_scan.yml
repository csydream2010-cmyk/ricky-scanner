name: Market Scanner
on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 時間 00:00 (台灣時間 08:00) 自動執行
  workflow_dispatch:    # 讓你可以在手機上隨時點擊按鈕執行

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許程式將結果自動存回倉庫
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scanner
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-update market report" || echo "No changes to commit"
          git push
